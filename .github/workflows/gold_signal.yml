name: Gold Signal Alert

on:
  schedule:
    # Run every 4 hours (UTC): 00:00, 04:00, 08:00, 12:00, 16:00, 20:00
    - cron: "0 */4 * * *"
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  check-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas numpy requests yfinance openpyxl

      - name: Restore state files
        uses: actions/cache/restore@v4
        with:
          path: |
            portfolio_state.json
            trade_log.json
            .thai_gold_signal_state.json
            .thai_gold_history.csv
          key: gold-state-${{ github.run_id }}
          restore-keys: |
            gold-state-

      - name: Run signal model
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}
        run: python gold_signal.py

      - name: Run portfolio tracker
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}
        run: python portfolio_tracker.py

      - name: Save state files
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            portfolio_state.json
            trade_log.json
            .thai_gold_signal_state.json
            .thai_gold_history.csv
          key: gold-state-${{ github.run_id }}

      - name: Commit state files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f portfolio_state.json trade_log.json .thai_gold_signal_state.json .thai_gold_history.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update gold signal state [skip ci]"
          git push || true
