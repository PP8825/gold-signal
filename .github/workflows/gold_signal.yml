name: Gold Signal Alert

on:
  schedule:
    # Signal check: every 4 hours (UTC)
    # Daily summary: 02:00 UTC = 09:00 Bangkok
    # Monthly report: 1st of every month 03:00 UTC = 10:00 Bangkok
    - cron: "0 */4 * * *"
    - cron: "0 2 * * *"
    - cron: "0 3 1 * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - signal
          - daily
          - monthly

jobs:
  # ── Signal check (every 4 hours) ──────────────────────────────
  signal-check:
    if: >-
      github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'signal')
      || github.event.schedule == '0 */4 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas numpy requests yfinance openpyxl

      - name: Pull latest state
        run: git pull --rebase || true

      - name: Run signal model
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}
        run: python gold_signal.py

      - name: Run portfolio tracker
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}
        run: python portfolio_tracker.py

      - name: Commit state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f portfolio_state.json trade_log.json .thai_gold_signal_state.json .thai_gold_history.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update signal state [skip ci]"
          git push || true

  # ── Daily summary (09:00 Bangkok) ─────────────────────────────
  daily-summary:
    if: >-
      github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'daily')
      || github.event.schedule == '0 2 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas numpy requests yfinance openpyxl

      - name: Pull latest state
        run: git pull --rebase || true

      - name: Send daily summary to LINE
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}
        run: python daily_summary.py

      - name: Commit state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f .thai_gold_history.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update history after daily summary [skip ci]"
          git push || true

  # ── Monthly report (1st of month, 10:00 Bangkok) ─────────────
  monthly-report:
    if: >-
      github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'monthly')
      || github.event.schedule == '0 3 1 * *'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas numpy requests yfinance openpyxl

      - name: Pull latest state
        run: git pull --rebase || true

      - name: Generate report and send summary to LINE
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}
        run: python monthly_report.py

      - name: Commit report and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f Gold_Forward_Test_Report.xlsx portfolio_state.json trade_log.json .thai_gold_history.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Monthly report generated [skip ci]"
          git push || true
