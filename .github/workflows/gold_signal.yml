name: Gold Signal Alert

permissions:
  contents: write

on:
  schedule:
    # Signal check: every 4 hours (UTC)
    - cron: "0 */4 * * *"
    # Monthly report: 18th May 2026 = day 30, then 1st of every month
    - cron: "0 3 1 * *"
    - cron: "0 3 15 5 *"
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: false
        default: "signal"
        type: choice
        options:
          - signal
          - monthly

jobs:
  # ── Signal check (every 4 hours) ──────────────────────────────
  # Only sends LINE when signal flips to BUY/SELL
  # Only trades when signal says BUY or SELL — HOLD = do nothing
  signal-check:
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'signal'
      || github.event.schedule == '0 */4 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas numpy requests yfinance openpyxl

      - name: Pull latest state
        run: git pull --rebase || true

      - name: Run signal model
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}
        run: python gold_signal.py

      - name: Run portfolio tracker
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}
        run: python portfolio_tracker.py

      - name: Commit state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in portfolio_state.json trade_log.json .thai_gold_signal_state.json .thai_gold_history.csv; do
            [ -f "$f" ] && git add -f "$f" && echo "Added $f" || echo "Skipped $f (not found)"
          done
          git diff --cached --stat
          git commit -m "Update signal state [skip ci]" && git push || echo "Nothing new to commit"

  # ── Monthly report (sends summary to LINE + saves Excel) ──────
  monthly-report:
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'monthly'
      || github.event.schedule == '0 3 1 * *'
      || github.event.schedule == '0 3 18 5 *'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas numpy requests yfinance openpyxl

      - name: Pull latest state
        run: git pull --rebase || true

      - name: Generate report and send summary to LINE
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}
        run: python monthly_report.py

      - name: Commit report and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in Gold_Forward_Test_Report.xlsx portfolio_state.json trade_log.json .thai_gold_signal_state.json .thai_gold_history.csv; do
            [ -f "$f" ] && git add -f "$f" && echo "Added $f" || echo "Skipped $f (not found)"
          done
          git commit -m "Monthly report generated [skip ci]" && git push || echo "Nothing new to commit"
